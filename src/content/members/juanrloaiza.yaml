info:
  en: |
    I'm a philosopher interested in interdisciplinary approaches to emotions, particularly in the frontier between philosophy, psychology, neuroscience, and the social sciences.

    Since 2023 I'm an associate professor in the [Department of Philosophy](https://filosofiahumanidades.uahurtado.cl/departamentos/filosofia/) at the [Universidad Alberto Hurtado](https://www.uahurtado.cl/) (Santiago, Chile). Previously I was an adjunct professor at [Universidad del Rosario](https://www.urosario.edu.co) (Bogotá, Colombia). I received my PhD from the [Berlin School of Mind and Brain](http://www.mind-and-brain.de/home/) and the [Institut für Philosophie](https://www.philosophie.hu-berlin.de/) at the Humboldt-Universität zu Berlin in 2020. I also hold a master's degree in mind and brain studies from the [Berlin School of Mind and Brain](http://www.mind-and-brain.de/home/) (2016).

    I have published papers in international journals such as [Review of Philosophy and Psychology (2021)](https://link.springer.com/article/10.1007%2Fs13164-020-00492-8), [The British Journal for the Philosophy of Science (2024)](https://www.journals.uchicago.edu/doi/abs/10.1086/715207), and [Theory & Psychology (2025)](https://journals.sagepub.com/doi/abs/10.1177/09593543251332575), as well as in Latin American journals such as [Ideas y Valores (2022)](https://revistas.unal.edu.co/index.php/idval/article/view/103859) and [Principia (2025)](https://periodicos.ufsc.br/index.php/principia/article/view/96263).

    Besides my research, I am a member of the [Sociedad Colombiana de Filosofía (SCF)](https://www.socolfil.org/), the [Sociedad Chilena de Filosofía de la Ciencia (SOCHIFIC)](https://www.sochific.cl/), and the [Asociación Latinoamericana de Filosofía Analítica (ALFAn)](http://alfan.org/en/).


  es: |
    Soy un filósofo interesado en las aproximaciones interdisciplinares a las emociones, particularmente en la frontera entre la filosofía, la psicología, la neurociencia y las ciencias sociales.

    Desde 2023 soy profesor asociado del [Departamento de Filosofía](https://filosofiahumanidades.uahurtado.cl/departamentos/filosofia/) de la [Universidad Alberto Hurtado](https://www.uahurtado.cl/) (Santiago, Chile). Antes de esto estuve en la [Universidad del Rosario](https://www.urosario.edu.co) (Bogotá, Colombia) como profesor de hora cátedra. Obtuve mi doctorado en la [Berlin School of Mind and Brain](http://www.mind-and-brain.de/home/) y el [Institut für Philosophie](https://www.philosophie.hu-berlin.de/) de la Humboldt-Universität zu Berlin en 2020. También cuento con una maestría en estudios de la mente y el cerebro de la [Berlin School of Mind and Brain](http://www.mind-and-brain.de/home/) (2016).

    He publicado artículos en revistas académicas internacionales como [Review of Philosophy and Psychology (2021)](https://link.springer.com/article/10.1007%2Fs13164-020-00492-8) y [The British Journal for the Philosophy of Science (2024)](https://www.journals.uchicago.edu/doi/abs/10.1086/715207), y [Theory & Psychology (2025)](https://journals.sagepub.com/doi/abs/10.1177/09593543251332575), y en revistas académicas latinoamericanas como [Ideas y Valores (2022)](https://revistas.unal.edu.co/index.php/idval/article/view/103859) y [Principia (2025)](https://periodicos.ufsc.br/index.php/principia/article/view/96263).

    Además de mi investigación, soy miembro de la [Sociedad Colombiana de Filosofía (SCF)](https://www.socolfil.org/), de la [Sociedad Chilena de Filosofía de la Ciencia (SOCHIFIC)](https://www.sochific.cl/) y de la [Asociación Latinoamericana de Filosofía Analítica (ALFAn)](http://alfan.org/es/).


