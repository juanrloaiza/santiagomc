abstract: "¿Son los trastornos psiquiátricos causados por el funcionamiento incorrecto de la maquinaria de la mente? ¿O pueden explicarse como el resultado de la falta de ajuste entre nuestros mecanismos psicológicos y un ambiente diferente a aquel en el cual estos sistemas evolucionaron? En este artículo, adoptamos elementos centrales de la concepción de la función propia desarrollada por Daniel Dennett para abordar una versión particular del debate entre teorías de la disfunción y teorías del desajuste, enfocándonos en casos de adicción a sustancias. Siguiendo la idea de Dennett según la cual no hay un hecho decisivo que determine la función propia de los sistemas biológicos, sostenemos que la decisión sobre la disfunción del sistema de recompensa en la adicción está subdeterminada por la evidencia. Nuestro argumento invita a reorientar la discusión, sugiriendo un nuevo foco en las consideraciones pragmáticas que pueden esgrimirse para elegir entre dos teorías empíricamente equivalentes."